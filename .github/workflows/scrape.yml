name: Scrape and Ingest

on:
  schedule:
    # Once daily, 06:00 UTC. Deliberately infrequent — scraping every few minutes
    # is unnecessarily aggressive for dealer sites that update prices at most once
    # a day. See cone/project/architecture/OVERVIEW.md.
    - cron: "0 6 * * *"
  workflow_dispatch: {}

jobs:
  scrape:
    runs-on: ubuntu-latest
    # Raised from 5: CelticGold and StoneX Bullion each crawl dozens of paginated
    # category pages with a polite 1-3s delay between requests, which alone pushed
    # a full run past the original 5-minute limit.
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm ci

      - run: npx tsx scripts/scrapeAndIngest.ts
        env:
          WORKER_URL: ${{ secrets.WORKER_URL }}
          INGEST_SECRET: ${{ secrets.INGEST_SECRET }}
