name: Deploy Pages Mirror

# Builds a static, API-less mirror of the frontend for GitHub Pages
# (https://<owner>.github.io/<repo>/) — a link safe to share where the Cloudflare
# workers.dev domain gets auto-removed (e.g. Reddit's spam filter). It calls the
# same live Cloudflare Worker for data (VITE_API_BASE_URL below), cross-origin.
# The Cloudflare deployment (npm run deploy) is unrelated and unaffected by this.

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'index.html'
      - 'package.json'
      - 'package-lock.json'
      - 'vite.config.ts'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm ci

      - run: npm run build
        env:
          VITE_API_BASE_URL: https://aurom.contact-youos.workers.dev

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      - id: deployment
        uses: actions/deploy-pages@v4
